spring.application.name=spreenboot

# Conexión a MongoDB (Local)
# mongodb://[host]:[puerto]/[nombre_de_la_bd]
spring.mongodb.uri=mongodb://localhost:27017/parcialsw1
# Muestra por qué se deniega el acceso
logging.level.org.springframework.security=DEBUG
# Muestra qué filtros se están ejecutando
logging.level.org.springframework.web.filter=DEBUG
# Mostrar los comandos que Spring ejecuta en la consola (útil para debug)
logging.level.org.springframework.data.mongodb.core.MongoTemplate=DEBUG